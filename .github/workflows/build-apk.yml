name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: ☕ 配置 Java 环境 (Android打包必须)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安装 Flet 和 依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet python-docx

      - name: 🚀 开始打包 APK (自动进入文件夹打包)
        working-directory: ./mymobileapp
        run: yes | flet build apk

      - name: 📤 上传最终安装包
        uses: actions/upload-artifact@v4
        with:
          name: TiKu-Shua-APK
          path: mymobileapp/build/apk/**/*.apk
